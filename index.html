<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamFit · 대학생 팀플 올인원</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --line:#e7e9ee; --text:#1a1c22; --muted:#8a8f99;
    --accent:#5b6cff; --accent-soft:#eef0ff; --ok:#1aa06d; --ok-soft:#e6f6ef;
    --radius:16px; --shadow:0 1px 3px rgba(20,24,40,.06),0 6px 24px rgba(20,24,40,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:20px 16px 80px}

  /* 상단 팀 헤더 */
  .team-head{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 22px;margin-bottom:18px}
  .team-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .team-name{font-size:22px;font-weight:700;border:none;background:transparent;color:var(--text);
    outline:none;flex:1;min-width:160px}
  .team-name:focus{background:var(--accent-soft);border-radius:8px;padding:2px 8px;margin:-2px -8px}
  .members{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;align-items:center}
  .chip{background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:600;
    padding:5px 11px;border-radius:999px;white-space:nowrap}
  .chip.gray{background:#f0f1f4;color:var(--muted)}

  /* 버튼 */
  .btn{border:none;border-radius:10px;padding:9px 15px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{background:#f0f1f4;color:var(--text)}
  .btn-sm{padding:6px 11px;font-size:13px}

  /* 섹션 제목 */
  .section-bar{display:flex;align-items:center;justify-content:space-between;margin:24px 4px 12px}
  .section-bar h2{font-size:16px;font-weight:700}

  /* 과목 카드 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:.15s;position:relative}
  .card:hover{transform:translateY(-2px);border-color:#d3d7e0}
  .card .accent-line{height:4px;border-radius:4px;width:38px;margin-bottom:12px}
  .card h3{font-size:17px;font-weight:700;margin-bottom:8px}
  .card .mem{font-size:13px;color:var(--muted);margin-bottom:14px;min-height:18px}
  .mods{display:flex;flex-wrap:wrap;gap:6px}
  .mod{font-size:12px;color:var(--muted);background:#f4f5f8;padding:4px 9px;border-radius:7px}
  .add-card{border:2px dashed var(--line);background:transparent;box-shadow:none;
    display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-weight:600;min-height:150px;font-size:15px}
  .add-card:hover{border-color:var(--accent);color:var(--accent);transform:none}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}

  /* 탭 */
  .tabs{display:flex;gap:2px;margin:20px 2px 18px;border-bottom:1px solid var(--line)}
  .tab{padding:10px 16px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;
    border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}

  /* 캘린더 */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-head h3{font-size:16px;font-weight:700}
  .cal-nav{display:flex;align-items:center;gap:10px}
  .cal-nav .month{font-weight:700;min-width:92px;text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-wd{text-align:center;font-size:12px;color:var(--muted);font-weight:600;padding:2px 0}
  .cal-cell{min-height:72px;border:1px solid var(--line);border-radius:9px;padding:5px 5px 6px;
    background:var(--card);overflow:hidden}
  .cal-cell.other{background:transparent;border-color:transparent}
  .cal-cell.today{border-color:var(--accent);border-width:1.5px}
  .cal-daynum{font-size:12px;color:var(--muted);margin-bottom:2px}
  .cal-ev{font-size:11px;line-height:1.35;border-radius:5px;padding:2px 6px;margin-top:3px;color:#fff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
  .cal-ev.done{opacity:.45;text-decoration:line-through}
  .cal-more{font-size:11px;color:var(--muted);margin-top:2px}
  .cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}
  .cal-legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .cal-note{margin-top:12px;font-size:12px;color:var(--muted);background:#f7f8fa;
    padding:9px 12px;border-radius:9px}

  /* 상세 화면 */
  .detail-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
  .back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
    font-family:inherit;font-weight:600;padding:6px 0}
  .detail-title{font-size:24px;font-weight:800}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-head h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}
  .row .who{font-weight:600;min-width:80px}
  .row .what{flex:1;color:var(--muted)}
  .row .date{font-size:13px;color:var(--muted)}
  .row.done .task-title{text-decoration:line-through;color:var(--muted)}
  .task-title{flex:1}
  /* D-day 배지 */
  .dday{display:inline-block;font-size:11px;font-weight:700;line-height:1.5;padding:2px 7px;
    border-radius:8px;white-space:nowrap;flex-shrink:0}
  .dday-over{background:#fdecea;color:#d0392e}
  .dday-today{background:#e0574f;color:#fff}
  .dday-soon{background:#fff2e0;color:#c9760a}
  .dday-far{background:var(--accent-soft);color:var(--accent)}
  /* 다가오는 마감 배너 */
  .dl-banner{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:16px 0 4px;
    box-shadow:0 1px 3px rgba(20,22,40,.04)}
  .dl-head{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .dl-count{display:inline-flex;align-items:center;justify-content:center;min-width:19px;height:19px;padding:0 5px;
    border-radius:10px;background:#e0574f;color:#fff;font-size:11px;font-weight:700}
  .dl-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);cursor:pointer}
  .dl-item:hover .dl-title{color:var(--accent)}
  .dl-title{flex:1;font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dl-more{padding:8px 0 0;font-size:13px;color:var(--muted);cursor:pointer;text-align:center}
  .dl-more:hover{color:var(--accent)}
  .check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
  .check.on{background:var(--ok);border-color:var(--ok)}
  .del{background:none;border:none;color:#c9ccd4;cursor:pointer;font-size:16px;padding:2px 6px}
  .del:hover{color:#e0574f}
  .add-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .add-row input,.add-row select{border:1px solid var(--line);border-radius:9px;padding:9px 11px;
    font-size:14px;font-family:inherit;outline:none;background:var(--card)}
  .add-row input:focus,.add-row select:focus{border-color:var(--accent)}
  .add-row .grow{flex:1;min-width:120px}
  .soon{color:var(--muted);font-size:14px;padding:8px 0}
  .anon-item{background:#f7f8fa;border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:14px}

  /* 의견 · 채팅 */
  .chat{display:flex;flex-direction:column;gap:7px;max-height:340px;overflow-y:auto;padding:4px 2px}
  .msg-row{display:flex;flex-direction:column;max-width:82%}
  .msg-row.me{align-self:flex-end;align-items:flex-end}
  .msg-row.other{align-self:flex-start;align-items:flex-start}
  .msg{padding:8px 12px;border-radius:14px;font-size:14px;line-height:1.45;word-break:break-word}
  .msg.me{background:var(--accent);color:#fff;border-bottom-right-radius:5px}
  .msg.other{background:#f0f1f4;color:var(--text);border-bottom-left-radius:5px}
  .msg-name{font-size:12px;color:var(--muted);margin:0 6px 3px}
  .msg-src{font-size:11px;color:var(--accent);font-weight:600;margin:0 6px 2px}
  .msg-share{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;margin:3px 4px 0;padding:0}
  .msg-share:hover{color:var(--accent)}
  .msg-share.on{color:var(--ok);font-weight:600}
  .msg-unread{font-size:11px;font-weight:700;color:#f0a020;margin:0 4px 2px;flex:none;white-space:nowrap}
  .badge-num{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;
    padding:0 5px;margin-left:5px;border-radius:9px;background:#e0574f;color:#fff;font-size:11px;
    font-weight:700;line-height:1;vertical-align:middle}
  .badge-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e0574f;
    margin-left:5px;vertical-align:middle}
  .chat-input{display:flex;gap:8px;margin-top:12px}
  .chat-input select{border:1px solid var(--line);border-radius:9px;padding:9px 8px;font-size:14px;
    font-family:inherit;outline:none;background:var(--card)}
  .chat-input input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;
    font-family:inherit;outline:none}
  .chat-input input:focus{border-color:var(--accent)}
  .msg-actions{display:flex;gap:10px;margin:3px 4px 0}
  .msg-actions .msg-share{margin:0}
  .msg-share.danger{color:#c98b85}
  .msg-share.danger:hover{color:#e0574f}
  .msg-editbox{border:1px solid var(--accent);border-radius:12px;padding:8px 12px;font-size:14px;
    font-family:inherit;outline:none;min-width:200px}
  /* 과목 이름 편집 */
  .detail-title-input{font-size:24px;font-weight:800;border:none;background:transparent;color:var(--text);
    outline:none;font-family:inherit;flex:1;min-width:0;padding:0}
  .detail-title-input:focus{background:var(--accent-soft);border-radius:8px;padding:2px 8px;margin:-2px -8px}

  /* 모달 */
  .overlay{position:fixed;inset:0;background:rgba(20,24,40,.4);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:50}
  .modal{background:var(--card);border-radius:18px;padding:24px;width:100%;max-width:420px;
    box-shadow:0 20px 60px rgba(20,24,40,.25)}
  .modal h3{font-size:19px;font-weight:700;margin-bottom:16px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;
    font-size:15px;font-family:inherit;outline:none}
  .field input:focus{border-color:var(--accent)}
  .picks{display:flex;flex-wrap:wrap;gap:8px}
  .pick{border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;
    cursor:pointer;user-select:none;font-weight:600;color:var(--muted)}
  .pick.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .forgot-row{margin:-6px 0 14px}
  .forgot-row a{font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline}
  .forgot-row a:hover{color:var(--accent)}
  .hidden{display:none}
  .dberr{position:fixed;left:50%;transform:translateX(-50%);top:20px;background:#e0574f;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:120;max-width:90%;
    box-shadow:0 8px 24px rgba(224,87,79,.35)}
  /* 상단 로딩바 (불확정 진행) */
  #busybar{position:fixed;top:0;left:0;height:3px;width:100%;z-index:100;
    background:transparent;overflow:hidden;opacity:0;transition:opacity .2s;pointer-events:none}
  #busybar.on{opacity:1}
  #busybar.on::before{content:"";position:absolute;top:0;left:0;height:100%;width:40%;
    background:var(--accent);border-radius:2px;animation:busyslide 1s ease-in-out infinite}
  @keyframes busyslide{0%{left:-40%}100%{left:100%}}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:#1aa06d;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:99;
    box-shadow:0 8px 24px rgba(26,160,109,.35)}
  /* 일정 목록의 과목 태그 */
  .sch-tag{font-size:11px;font-weight:600;color:#fff;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .rep{font-size:11px;margin-left:6px;opacity:.7}
  .edit-target{cursor:pointer}
  .edit-target:hover{color:var(--accent);text-decoration:underline dotted}
  .file-name{flex:1;cursor:pointer;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-name:hover{color:var(--accent);text-decoration:underline}
  .file-meta{font-size:12px;color:var(--muted);white-space:nowrap}
  /* 자료 출처별 묶음 */
  .file-group{margin-bottom:14px}
  .file-group:last-child{margin-bottom:0}
  .file-group-head{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--text);
    margin:0 0 2px;padding-top:4px}
  .file-group-head .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
  .file-group-count{font-size:11px;font-weight:600;color:var(--muted)}
  /* 반복 일정 만들기 버튼 · 미리보기 */
  .repeat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;
    border:1px dashed var(--line);background:transparent;border-radius:11px;padding:12px;
    font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:.15s}
  .repeat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .modal-sub{font-size:13px;color:var(--muted);margin:-8px 0 16px;line-height:1.5}
  .rp-preview{margin-bottom:16px;font-size:13px;padding:12px 14px;border-radius:10px;line-height:1.6}
  .rp-preview.muted{background:#f7f8fa;color:var(--muted)}
  .rp-preview.ok{background:var(--accent-soft);color:var(--accent)}
  .rp-preview.warn{background:#fdecea;color:#c0392b}
  .rp-dates{font-weight:500;opacity:.9}
  /* 마이페이지 2단 배치 */
  .mp-grid{display:grid;grid-template-columns:210px 1fr;gap:26px;align-items:start;margin-bottom:20px}
  .mp-summary{display:flex;align-items:center;gap:18px}
  .mp-summary .avatar{flex:none}
  .mp-summary-info{flex:1;min-width:0}
  .mp-left{text-align:center}
  .mp-left .avatar{margin:0 auto 12px}
  @media(max-width:640px){ .mp-grid{grid-template-columns:1fr} .mp-left .avatar{margin-bottom:10px} }

  /* ===== 랜딩(초기 화면) ===== */
  .landing{max-width:1080px;margin:0 auto}
  .promo{background:linear-gradient(90deg,#4b5cf5,#8455f0);color:#fff;text-align:center;
    padding:10px 16px;margin:-20px -16px 0;font-size:13px;font-weight:500}
  .promo b{font-weight:700}
  .promo .promo-cta{color:#fff;font-weight:700;text-decoration:underline;cursor:pointer;white-space:nowrap}
  .landing-nav{display:flex;align-items:center;gap:20px;padding:20px 4px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{font-size:23px;font-weight:800;letter-spacing:-.5px;cursor:pointer;user-select:none}
  .brand:hover{opacity:.7}
  .brand .brand-dot{color:var(--accent)}
  .nav-menu{display:flex;gap:24px;margin-left:14px}
  .nav-menu a{font-size:15px;font-weight:600;color:var(--muted);cursor:pointer}
  .nav-menu a:hover{color:var(--text)}
  .nav-btns{display:flex;gap:10px;margin-left:auto}
  .nav-btn{border:1px solid var(--line);background:var(--card);border-radius:10px;
    padding:9px 16px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;transition:.15s}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-btn.primary{background:linear-gradient(90deg,#4b5cf5,#7b5cf0);border:none;color:#fff}
  .nav-btn.primary:hover{filter:brightness(1.07);color:#fff}

  .hero2{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:64px 4px 44px}
  .hero-eyebrow{display:inline-block;font-size:13px;font-weight:600;color:var(--accent);
    background:var(--accent-soft);padding:6px 15px;border-radius:999px;margin-bottom:22px}
  .hero-title{font-size:clamp(34px,4.6vw,50px);font-weight:800;letter-spacing:-1.5px;line-height:1.15;margin-bottom:20px}
  .grad{background:linear-gradient(90deg,#4b5cf5,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-sub{font-size:clamp(15px,2.4vw,18px);color:var(--muted);margin-bottom:32px;line-height:1.6}
  .hero-cta{font-size:16px;padding:15px 30px;border-radius:12px;
    background:linear-gradient(90deg,#4b5cf5,#7b5cf0);box-shadow:0 10px 24px rgba(75,92,245,.32)}
  .hero-cta:hover{filter:brightness(1.06)}
  .hero-trust{margin-top:20px;font-size:13px;color:var(--muted);font-weight:600}
  .hero-trust b{color:var(--accent)}

  /* 앱 미리보기 목업 */
  .preview{background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 24px 60px rgba(35,40,90,.20);overflow:hidden}
  .preview-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line);background:#fafbfc}
  .preview-bar .dot{width:10px;height:10px;border-radius:50%}
  .preview-title{margin-left:10px;font-size:12px;color:var(--muted);font-weight:600}
  .preview-body{padding:16px}
  .pv-tabs{display:flex;gap:14px;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:14px;
    border-bottom:1px solid var(--line);padding-bottom:9px}
  .pv-tabs .on{color:var(--accent)}
  .pv-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .pv-wd{font-size:9px;text-align:center;color:var(--muted);padding-bottom:2px}
  .pv-cell{min-height:30px;border:1px solid var(--line);border-radius:5px;padding:3px 4px;font-size:9px;color:var(--muted)}
  .pv-ev{height:6px;border-radius:2px;margin-top:2px}

  /* 기능 상세 페이지 */
  .fb{display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:center;
    padding:54px 4px;border-top:1px solid var(--line)}
  .fb.flip .fb-text{order:2}
  .fb-badge{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);
    background:var(--accent-soft);padding:5px 13px;border-radius:999px;margin-bottom:14px}
  .fb h3{font-size:clamp(21px,3.2vw,27px);font-weight:800;margin-bottom:12px;letter-spacing:-.5px}
  .fb .lead{color:var(--muted);font-size:16px;line-height:1.65;margin-bottom:20px}
  .fb ul{list-style:none;display:flex;flex-direction:column;gap:11px}
  .fb li{font-size:14.5px;line-height:1.6;padding-left:25px;position:relative}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== 데이터 (Supabase 클라우드) ===== */
const COLORS = ["#5b6cff","#1aa06d","#e0574f","#e8942e","#9b59d6","#0aa2c0","#d6478c"];
const TEAM_COLOR = "#3f4756"; /* 팀 공용 일정 색 (짙은 슬레이트) */
const MODULES = ["역할 분담","일정 · 마감","자료 · 정리본"];

const SB_URL = "https://ijxfyhqhemafmfpnqdbn.supabase.co";
const SB_KEY = "sb_publishable_Ljkx-V6X2KwSw-0F95CLug_jqwNwPBU";
const sb = window.supabase.createClient(SB_URL, SB_KEY);
const FEEDBACK_URL = "https://open.kakao.com/o/gK3XisFi"; /* 카카오 오픈채팅 문의·피드백 */

function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

/* 내 프로필(닉네임·아바타)만 이 브라우저에 저장. 팀 데이터는 전부 클라우드 */
function loadMe(){ try{ return JSON.parse(localStorage.getItem("teamfit_user"))||{} }catch(e){ return {} } }
function save(){
  localStorage.setItem("teamfit_user", JSON.stringify({
    me:state.me, avatarEmoji:state.avatarEmoji, avatarColor:state.avatarColor, avatarImg:state.avatarImg
  }));
  if(uid()) saveProfile();
}

let state = Object.assign({ me:"나", avatarEmoji:"🙂", avatarColor:"#5b6cff", avatarImg:null }, loadMe());
state.teams = [];

/* ===== 로그인(계정) ===== */
let session = null;
function uid(){ return session && session.user ? session.user.id : null; }
function isLoggedIn(){ return !!uid(); }
function myEmail(){ return session && session.user ? session.user.email : ""; }

/* 내 프로필을 계정에서 불러오기 (없으면 새로 만듦) */
async function loadProfile(){
  if(!uid()) return;
  const { data, error } = await sb.from("profiles").select("*").eq("id",uid()).maybeSingle();
  if(error) return dbError(error);
  let p = data;
  if(!p){
    const ins = await sb.from("profiles").insert({
      id:uid(), nickname:(state.me==="나"?"":state.me)||"멤버",
      avatar_emoji:state.avatarEmoji, avatar_color:state.avatarColor
    }).select().single();
    if(ins.error) return dbError(ins.error);
    p = ins.data;
  }
  state.me = p.nickname || "멤버";
  state.avatarEmoji = p.avatar_emoji || "🙂";
  state.avatarColor = p.avatar_color || "#5b6cff";
  state.avatarImg = p.avatar_img || null;
}
async function saveProfile(){
  if(!uid()) return;
  const { error } = await sb.from("profiles").update({
    nickname:state.me, avatar_emoji:state.avatarEmoji,
    avatar_color:state.avatarColor, avatar_img:state.avatarImg
  }).eq("id",uid());
  if(error) dbError(error);
}

/* DB 오류를 화면에 보여주기 */
/* 서버/인증 영문 오류를 한글 안내로 변환. 이미 한글이면 그대로. */
function krError(e){
  const raw=(e && e.message ? e.message : String(e==null?"":e)).trim();
  if(!raw) return "알 수 없는 문제가 생겼어요. 잠시 후 다시 시도해주세요.";
  if(/[가-힣]/.test(raw)) return raw;              /* 우리 커스텀·한글 메시지는 통과 */
  const m=raw.toLowerCase(); const has=s=>m.includes(s);

  /* 인증(로그인·가입·비번) */
  if(has("invalid login credentials"))                       return "이메일 또는 비밀번호가 맞지 않아요.";
  if(has("email not confirmed"))                             return "이메일 인증이 필요해요. 메일함을 확인해주세요.";
  if(has("already registered")||has("user already")||has("already exists")) return "이미 가입된 이메일이에요. 로그인해주세요.";
  if(has("password should be at least")||has("weak password")) return "비밀번호는 6자 이상이어야 해요.";
  if(has("should be different"))                             return "새 비밀번호가 기존과 같아요. 다른 걸 입력해주세요.";
  if(has("unable to validate email")||has("invalid email")||has("invalid format")) return "이메일 형식이 올바르지 않아요.";
  if(has("signups not allowed")||has("signup is disabled"))  return "지금은 회원가입을 받지 않고 있어요.";
  if(has("rate limit")||has("for security purposes")||has("too many requests")) return "요청이 많아 잠시 제한됐어요. 잠시 후 다시 시도해주세요.";
  if(has("token has expired")||has("expired or is invalid")||has("otp")) return "링크가 만료됐어요. 다시 요청해주세요.";
  if(has("jwt")||(has("session")&&(has("missing")||has("expired")))) return "로그인이 만료됐어요. 다시 로그인해주세요.";

  /* DB·권한 */
  if(has("row-level security")||has("row level security")||has("permission denied")||has("not authorized")||has("violates")&&has("policy"))
    return "권한이 없어요. 팀 멤버만 할 수 있는 작업이에요.";
  if(has("duplicate key"))                                   return "이미 있는 항목이에요.";
  if(has("foreign key"))                                     return "연결된 데이터가 없어 처리할 수 없어요.";
  if(has("too long"))                                        return "입력이 너무 길어요. 조금 줄여주세요.";
  if(has("null value")||has("not-null"))                     return "필수 항목이 비어 있어요.";

  /* 네트워크 */
  if(has("failed to fetch")||has("network")||has("load failed")||has("timeout"))
    return "인터넷 연결이 불안정해요. 연결을 확인하고 다시 시도해주세요.";

  /* 그 외: 영문 원문 대신 일반 안내 (원문은 콘솔에 남김) */
  return "처리 중 문제가 생겼어요. 잠시 후 다시 시도해주세요.";
}

function dbError(e){
  console.error(e);
  let bar=document.getElementById("dberr");
  if(!bar){ bar=document.createElement("div"); bar.id="dberr"; bar.className="dberr"; document.body.appendChild(bar); }
  bar.textContent = krError(e);
  bar.style.display="block";
  setTimeout(()=>{ bar.style.display="none"; }, 6000);
}

/* ===== 로딩 표시 (상단 얇은 바) ===== */
let busyCount=0;
function setBusy(on){
  busyCount += on ? 1 : -1;
  if(busyCount<0) busyCount=0;
  let b=document.getElementById("busybar");
  if(!b){ b=document.createElement("div"); b.id="busybar"; document.body.appendChild(b); }
  b.className = busyCount>0 ? "on" : "";
}

/* 팀 목록 불러오기 */
async function loadTeams(){
  setBusy(true);
  try{
  state.teams = [];
  if(!uid()) return;                     /* 로그인 안 했으면 팀 없음 */
  /* 내가 멤버로 속한 팀만 */
  const mine = await sb.from("members").select("team_id").eq("user_id", uid());
  if(mine.error) return dbError(mine.error);
  const myIds = [...new Set((mine.data||[]).map(r=>r.team_id))];
  if(!myIds.length) return;

  const { data, error } = await sb.from("teams").select("*").in("id",myIds).order("created_at");
  if(error) return dbError(error);
  const ids = (data||[]).map(t=>t.id);
  let memRows=[], subRows=[];
  if(ids.length){
    const [m,s] = await Promise.all([
      sb.from("members").select("team_id").in("team_id",ids),
      sb.from("subjects").select("team_id").in("team_id",ids)
    ]);
    memRows=m.data||[]; subRows=s.data||[];
  }
  const countIn=(arr,id)=>arr.filter(r=>r.team_id===id).length;
  state.teams = (data||[]).map(t=>({
    id:t.id, name:t.name, code:t.code, created_by:t.created_by||null,
    memberCount:countIn(memRows,t.id), subjectCount:countIn(subRows,t.id),
    members:[], _memberRows:[], subjects:[], teamSchedule:[], teamComments:[]
  }));
  } finally { setBusy(false); }
}

/* 팀 하나의 전체 내용 불러오기 */
async function loadTeam(teamId){
  const t = state.teams.find(x=>x.id===teamId);
  if(!t) return;
  setBusy(true);
  try{
  const [mem, sub] = await Promise.all([
    sb.from("members").select("*").eq("team_id",teamId).order("created_at"),
    sb.from("subjects").select("*").eq("team_id",teamId).order("created_at")
  ]);
  if(mem.error) return dbError(mem.error);
  if(sub.error) return dbError(sub.error);

  t._memberRows = mem.data||[];
  t.members = t._memberRows.map(m=>m.name);
  t.subjects = (sub.data||[]).map(s=>({
    id:s.id, name:s.name, color:s.color||"#5b6cff",
    members:s.members||[], roles:[], schedule:[], comments:[]
  }));
  const byId={}; t.subjects.forEach(s=>byId[s.id]=s);
  const ids = t.subjects.map(s=>s.id);

  const [sch, com, rol, fil, rd] = await Promise.all([
    sb.from("schedules").select("*").eq("team_id",teamId).order("date"),
    sb.from("comments").select("*").eq("team_id",teamId).order("created_at"),
    ids.length ? sb.from("roles").select("*").in("subject_id",ids) : Promise.resolve({data:[]}),
    sb.from("files").select("*").eq("team_id",teamId).order("created_at"),
    sb.from("chat_reads").select("*").eq("team_id",teamId)
  ]);

  t.teamSchedule=[];
  (sch.data||[]).forEach(r=>{
    const item={id:r.id,title:r.title,date:r.date,done:r.done,series_id:r.series_id||null};
    if(r.subject_id){ if(byId[r.subject_id]) byId[r.subject_id].schedule.push(item); }
    else t.teamSchedule.push(item);
  });
  (rol.data||[]).forEach(r=>{
    if(byId[r.subject_id]) byId[r.subject_id].roles.push({id:r.id,who:r.who,what:r.what});
  });
  t.teamComments=[];
  (com.data||[]).forEach(c=>{
    const m={id:c.id,who:c.who,text:c.text,shared:c.shared,ts:new Date(c.created_at).getTime()};
    if(c.subject_id){ if(byId[c.subject_id]) byId[c.subject_id].comments.push(m); }
    else t.teamComments.push(m);
  });

  t.files=[]; t.subjects.forEach(s=>s.files=[]);
  (fil.data||[]).forEach(f=>{
    const item={id:f.id,name:f.name,path:f.path,size:f.size,who:f.uploaded_by,shared:f.shared};
    if(f.subject_id){ if(byId[f.subject_id]) byId[f.subject_id].files.push(item); }
    else t.files.push(item);
  });

  /* 읽음 상태: reads[scope][user_id] = 마지막 읽은 시각(ms). scope='team' 또는 subject_id */
  t.reads = {};
  (rd.data||[]).forEach(r=>{
    (t.reads[r.scope] = t.reads[r.scope] || {})[r.user_id] = new Date(r.last_read_at).getTime();
  });
  } finally { setBusy(false); }
}

/* 변경 후 현재 팀을 다시 불러와 화면 갱신 */
async function refresh(){ await loadTeam(view.teamId); render(); autoMarkRead(); }
function killModal(){ const o=document.getElementById("overlay"); if(o) o.remove(); }

/* ── 읽음 표시 / 안 읽음 뱃지 ── */
/* 대화방(scope)의 메시지 목록. 'team'은 팀 피드(공유된 과목 의견 포함) */
function scopeMsgs(scope){
  if(scope==="team") return teamCommentFeed();
  const s=T().subjects.find(x=>x.id===scope);
  return s ? (s.comments||[]) : [];
}
/* 내가 이 대화방을 마지막으로 읽은 시각(ms) */
function myReadMs(scope){
  const r=T().reads;
  return (r && r[scope] && r[scope][uid()]) || 0;
}
/* 내가 아직 안 읽은 메시지 수(내 메시지는 제외) */
function unreadCount(scope){
  const mine=myReadMs(scope), me=currentUser();
  return scopeMsgs(scope).filter(m=>(m.ts||0)>mine && m.who!==me).length;
}
/* 이 팀의 모든 과목 통틀어 안 읽은 수 */
function subjectsUnread(){
  return (T().subjects||[]).reduce((n,s)=>n+unreadCount(s.id),0);
}
/* 특정 메시지(ts)를 아직 안 읽은 팀원 수 (카톡형) */
function unreadPeople(scope, ts){
  const t=T(), reads=(t.reads&&t.reads[scope])||{};
  const ids=(t._memberRows||[]).map(m=>m.user_id).filter(Boolean);
  if(ids.length<2) return 0;                 /* 혼자면 표시 안 함 */
  let readers=0;
  ids.forEach(id=>{ if((reads[id]||0)>=ts) readers++; });
  return Math.max(0, ids.length-readers);
}
/* 안 읽음 뱃지 HTML (숫자형) */
function unreadBadge(scope){
  const n=unreadCount(scope);
  return n>0 ? `<span class="badge-num">${n>99?"99+":n}</span>` : "";
}
/* 이 대화방을 지금 읽음으로 표시 (새 메시지가 있을 때만 DB 기록) */
function markRead(scope){
  if(!uid()) return;
  const latest=scopeMsgs(scope).reduce((a,m)=>Math.max(a,m.ts||0),0);
  if(!latest || myReadMs(scope)>=latest) return;   /* 새 메시지 없음 → 기록/재렌더 안 함(루프 방지) */
  const t=T();
  (t.reads[scope]=t.reads[scope]||{})[uid()]=Date.now();  /* 로컬 즉시 반영 */
  render();
  sb.from("chat_reads").upsert(
    { team_id:view.teamId, user_id:uid(), scope, last_read_at:new Date().toISOString() },
    { onConflict:"team_id,user_id,scope" }
  ).then(({error})=>{ if(error) console.warn("read upsert:", error.message); });
}
/* 지금 보고 있는 대화방을 자동으로 읽음 처리 */
function autoMarkRead(){
  if(view.name==="subject" && view.subjectId) markRead(view.subjectId);
  else if(view.name==="team" && activeTab==="chat") markRead("team");
}

/* ── 실시간 동기화 (Supabase realtime) ──
   팀원이 DB를 바꾸면 변경 이벤트를 받아 현재 팀을 다시 불러온다.
   단, 내가 입력/편집 중이면 화면을 새로 그리지 않고 잠깐 미룬다(입력 유실 방지). */
let rtChannel = null;   /* 현재 구독 중인 채널 */
let rtTeamId  = null;   /* 구독 중인 팀 id */
let rtTimer   = null;   /* 디바운스/재시도 타이머 */

/* 지금 다시 그리면 안 되는 상황인가 (모달·편집·입력 중) */
function syncBusy(){
  if(document.getElementById("overlay")) return true;   /* 모달 열림 */
  if(editingMsg) return true;                            /* 메시지 편집 중 */
  const a = document.activeElement;                      /* 어떤 입력칸에 커서가 있으면 */
  if(a && (a.tagName==="INPUT" || a.tagName==="TEXTAREA" || a.isContentEditable)) return true;
  return false;
}

/* 변경 이벤트 → 디바운스된 refresh (바쁘면 미뤘다 재시도) */
function syncPing(){
  clearTimeout(rtTimer);
  rtTimer = setTimeout(function run(){
    if(view.name!=="team" && view.name!=="subject") return;   /* 팀을 떠났으면 무시 */
    if(syncBusy()){ rtTimer = setTimeout(run, 1500); return; } /* 입력 중이면 잠시 후 재시도 */
    refresh();
  }, 400);
}

/* 이 팀의 변경을 구독 (이미 같은 팀이면 그대로 둠) */
function syncTeam(teamId){
  if(!teamId) return;
  if(rtTeamId===teamId && rtChannel) return;
  syncOff();
  rtTeamId = teamId;
  const f = "team_id=eq."+teamId;
  rtChannel = sb.channel("team_"+teamId)
    .on("postgres_changes", {event:"*", schema:"public", table:"members",   filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"subjects",  filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"schedules", filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"comments",  filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"files",     filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"chat_reads",filter:f}, syncPing)
    .on("postgres_changes", {event:"*", schema:"public", table:"roles"}, syncPing) /* roles엔 team_id 없음 → 전체 구독, RLS로 걸러짐 */
    .subscribe();
}

/* 구독 해제 (팀을 떠나거나 로그아웃할 때) */
function syncOff(){
  clearTimeout(rtTimer); rtTimer=null;
  if(rtChannel){ sb.removeChannel(rtChannel); rtChannel=null; }
  rtTeamId=null;
}

/* 현재 보고 있는 팀 */
function T(){
  return state.teams.find(t=>t.id===view.teamId)
      || {name:"",code:"",members:[],_memberRows:[],teamSchedule:[],teamComments:[],subjects:[]};
}

let view = {name:"home", teamId:null, subjectId:null};
let activeTab = "projects";
function setTab(t){ activeTab=t; render(); if(t==="chat") markRead("team"); }
let editingMsg = null; /* {scope, id} 편집 중인 메시지 */
let openMsg = null;    /* {scope, id} 액션(수정/삭제) 펼친 메시지 */
let calCursor = null;

/* ===== 캘린더: 모든 세부 프로젝트 일정을 위로 모음 ===== */
function pad(n){ return String(n).padStart(2,"0"); }
function allEvents(){
  const out=[];
  (T().teamSchedule||[]).forEach(t=>{
    if(t.date) out.push({date:t.date,title:t.title,done:t.done,color:TEAM_COLOR,subject:"팀 전체"});
  });
  T().subjects.forEach(s=>{
    (s.schedule||[]).forEach(t=>{
      if(t.date) out.push({date:t.date,title:t.title,done:t.done,color:s.color||"#5b6cff",subject:s.name});
    });
  });
  return out;
}
/* ===== 마감 D-day ===== */
/* 오늘 기준 남은 일수 (음수=지남). dateStr='YYYY-MM-DD' */
function daysUntil(dateStr){
  if(!dateStr) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(dateStr+"T00:00"); if(isNaN(d)) return null;
  d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
/* D-day 배지 HTML (완료·날짜없음·15일 이상 먼 미래엔 표시 안 함) */
function ddayBadge(dateStr, done){
  if(done) return "";
  const n=daysUntil(dateStr);
  if(n===null) return "";
  if(n<0)   return `<span class="dday dday-over">${-n}일 지남</span>`;
  if(n===0) return `<span class="dday dday-today">오늘 마감</span>`;
  if(n===1) return `<span class="dday dday-soon">내일</span>`;
  if(n<=3)  return `<span class="dday dday-soon">D-${n}</span>`;
  if(n<=14) return `<span class="dday dday-far">D-${n}</span>`;
  return "";
}
/* 팀+과목 모든 일정을 tag/color 붙여 한 배열로 */
function allSchedItems(){
  const all=[];
  (T().teamSchedule||[]).forEach(t=>all.push(Object.assign({},t,{tag:"팀 전체",color:TEAM_COLOR})));
  (T().subjects||[]).forEach(s=>(s.schedule||[]).forEach(t=>
    all.push(Object.assign({},t,{tag:s.name,color:s.color||"#5b6cff"}))));
  return all;
}
/* 마감 임박: 미완료 + (지났거나 within일 이내), 가까운 순 */
function upcomingDeadlines(within){
  return allSchedItems()
    .filter(t=>!t.done && t.date)
    .map(t=>Object.assign({},t,{diff:daysUntil(t.date)}))
    .filter(t=>t.diff!==null && t.diff<=within)
    .sort((a,b)=>a.diff-b.diff);
}

function initCursor(){
  if(calCursor) return;
  const dates=allEvents().map(e=>e.date).sort();
  const d = dates.length ? new Date(dates[0]+"T00:00") : new Date();
  calCursor={y:d.getFullYear(), m:d.getMonth()};
}
function changeMonth(delta){
  initCursor(); let {y,m}=calCursor; m+=delta;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  calCursor={y,m}; render();
}
function renderCalendar(){
  initCursor();
  const {y,m}=calCursor;
  const startDow=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const now=new Date();
  const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const byDay={};
  allEvents().forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });

  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell other"></div>`;
  for(let d=1;d<=days;d++){
    const key=`${y}-${pad(m+1)}-${pad(d)}`;
    const evs=byDay[key]||[];
    const shown=evs.slice(0,2).map(e=>
      `<div class="cal-ev ${e.done?'done':''}" style="background:${e.color}" title="${esc(e.subject)} · ${esc(e.title)}">${esc(e.title)}</div>`).join("");
    const more=evs.length>2?`<div class="cal-more">+${evs.length-2}</div>`:"";
    cells+=`<div class="cal-cell ${key===todayKey?'today':''}"><div class="cal-daynum">${d}</div>${shown}${more}</div>`;
  }
  const wd=["일","월","화","수","목","금","토"].map(w=>`<div class="cal-wd">${w}</div>`).join("");
  const legendParts=[];
  if((T().teamSchedule||[]).some(t=>t.date))
    legendParts.push(`<span><i style="background:${TEAM_COLOR}"></i>팀 전체</span>`);
  T().subjects.filter(s=>(s.schedule||[]).some(t=>t.date))
    .forEach(s=>legendParts.push(`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`));
  const legend=legendParts.join("");
  /* 날짜를 안 정한 일정 개수 (달력엔 못 올라감) */
  let noDate = (T().teamSchedule||[]).filter(t=>!t.date).length;
  (T().subjects||[]).forEach(s=>{ noDate += (s.schedule||[]).filter(t=>!t.date).length; });

  return `
    <div class="panel">
      <div class="cal-head">
        <h3>🗓️ 전체 일정</h3>
        <div class="cal-nav">
          <button class="btn btn-ghost btn-sm" onclick="changeMonth(-1)">‹</button>
          <span class="month">${y}년 ${m+1}월</span>
          <button class="btn btn-ghost btn-sm" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid" style="margin-bottom:5px">${wd}</div>
      <div class="cal-grid">${cells}</div>
      ${legend?`<div class="cal-legend">${legend}</div>`:""}
      ${noDate?`<div class="cal-note">🗓️ 날짜를 안 정한 일정 ${noDate}개는 아래 목록에만 표시돼요. 날짜를 넣으면 달력에 올라와요.</div>`:""}
    </div>`;
}

/* ===== 팀 공용 일정 (세부 프로젝트 안 나눠도 팀 페이지에서 바로) ===== */
function renderTeamSchedule(){
  /* 팀 공용 + 모든 과목의 일정을 한 목록으로 모음 */
  const all = allSchedItems();
  all.sort((a,b)=>String(a.date||"9999-99-99").localeCompare(String(b.date||"9999-99-99")));

  const rows = all.map(t=>{
    if(editingSched===t.id) return schedEditRow(t);
    return `<div class="row ${t.done?'done':''}">
      <div class="check ${t.done?'on':''}" onclick="toggleDone('${t.id}',${!!t.done})">${t.done?'✓':''}</div>
      <span class="task-title edit-target" onclick="editSched('${t.id}')" title="클릭해서 수정">${esc(t.title)}${t.series_id?'<span class="rep" title="반복 일정">🔁</span>':''}</span>
      <span class="sch-tag" style="background:${t.color}">${esc(t.tag)}</span>
      ${ddayBadge(t.date,t.done)}
      <span class="date">${esc(t.date||'')}</span>
      <button class="del" onclick="askDelete('${t.id}',${t.series_id?`'${t.series_id}'`:"null"})">✕</button>
    </div>`;
  }).join("")
    || `<div class="soon">아직 일정이 없어요. 아래에서 팀 전체 일정을 넣거나, 과목 안에서 마감을 추가해보세요.</div>`;
  return `
    <div class="panel">
      <div class="panel-head"><h3>📌 일정 목록 <span style="font-size:12px;font-weight:500;color:var(--muted)">팀 + 모든 과목</span></h3></div>
      ${rows}
      <div class="add-row">
        <input class="grow" id="teamTaskTitle" placeholder="할 일 / 마감 (팀 전체가 함께)" />
        <input id="teamTaskDate" type="date" value="${todayStr()}" />
        <button class="btn btn-primary btn-sm" onclick="addTeamTask()">추가</button>
      </div>
      <button class="repeat-btn" onclick="repeatStart(null)">🔁 매주·격주로 반복되는 일정 만들기</button>
    </div>`;
}

/* ===== 프로필 · 아바타 ===== */
function currentUser(){ return state.me || "나"; }
/* 오늘 날짜 YYYY-MM-DD (로컬 기준, 타임존 밀림 방지) */
function todayStr(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function colorForName(name){
  const cs=["#5b6cff","#1aa06d","#e0574f","#e8942e","#9b59d6","#0aa2c0","#d6478c"];
  let h=0; for(const ch of (name||"?")) h=(h*31+ch.charCodeAt(0))>>>0;
  return cs[h%cs.length];
}
function avatarMarkup(p, cls){
  cls = cls?(" "+cls):"";
  /* 보안: 진짜 base64 이미지 데이터만 허용 (임의 문자열 주입=XSS 차단). 색도 hex만. */
  const img = p.avatarImg;
  const okImg = typeof img==="string" && /^data:image\/(png|jpe?g|gif|webp);base64,[A-Za-z0-9+/=]+$/.test(img);
  if(okImg) return `<span class="avatar${cls}" style="background-image:url('${img}')"></span>`;
  const col = /^#[0-9a-fA-F]{3,8}$/.test(p.avatarColor||"") ? p.avatarColor : "#5b6cff";
  return `<span class="avatar${cls}" style="background:${col}">${esc(p.avatarEmoji||'🙂')}</span>`;
}
function avatarHtml(who, cls){
  if(who===currentUser()) return avatarMarkup(state, cls);
  cls = cls?(" "+cls):"";
  return `<span class="avatar${cls}" style="background:${colorForName(who)}">${esc((who||'?').slice(0,1))}</span>`;
}
function toast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.style.display="block";
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>{ el.style.display="none"; },2200);
}

/* 마이페이지: 편집 중인 임시본(draft) — 저장 눌러야 확정 */
let mpDraft = null;
function mpDirty(){
  if(!mpDraft) return false;
  return mpDraft.me!==state.me || mpDraft.avatarEmoji!==state.avatarEmoji
      || mpDraft.avatarColor!==state.avatarColor || mpDraft.avatarImg!==state.avatarImg;
}
function setAvatarEmoji(e){ if(mpDraft){ mpDraft.avatarEmoji=e; mpDraft.avatarImg=null; render(); } }
function setAvatarColor(c){ if(mpDraft){ mpDraft.avatarColor=c; render(); } }
function clearAvatarImg(){ if(mpDraft){ mpDraft.avatarImg=null; render(); } }
function mpSave(){
  if(!mpDraft) return;
  state.me = (mpDraft.me||"").trim() || "나";
  state.avatarEmoji = mpDraft.avatarEmoji;
  state.avatarColor = mpDraft.avatarColor;
  state.avatarImg   = mpDraft.avatarImg;
  mpDraft = {me:state.me, avatarEmoji:state.avatarEmoji, avatarColor:state.avatarColor, avatarImg:state.avatarImg};
  save(); render(); toast("저장됐어요 ✓");
}
function onAvatarFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const size=128, c=document.createElement("canvas"); c.width=size; c.height=size;
      const ctx=c.getContext("2d");
      const s=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,size,size);
      if(mpDraft){ mpDraft.avatarImg=c.toDataURL("image/jpeg",0.85); render(); }
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
}

/* ===== 의견 · 채팅 ===== */
function renderBubbles(msgs, opts){
  opts=opts||{};
  const scope=opts.scope;
  if(!msgs.length) return `<div class="soon">아직 대화가 없어요. 첫 메시지를 남겨보세요.</div>`;
  return `<div class="chat">` + msgs.map(m=>{
    const me = m.who===currentUser();
    const src = m.source ? `<div class="msg-src">📎 ${esc(m.source)}에서 공유</div>` : "";
    const name = !me ? `<div class="msg-name">${esc(m.who)}</div>` : "";

    const av = avatarHtml(m.who,"sm");

    /* 편집 중인 메시지는 입력창으로 */
    if(editingMsg && editingMsg.scope===scope && editingMsg.id===m.id){
      const row=`<div class="msg-row ${me?"me":"other"}">${src}${name}
        <input class="msg-editbox" id="msgedit_${m.id}" value="${esc(m.text)}"
          onkeydown="if(event.key==='Enter')saveMsgEdit('${scope}','${m.id}')" />
        <div class="msg-actions">
          <button class="msg-share" onclick="saveMsgEdit('${scope}','${m.id}')">저장</button>
          <button class="msg-share" onclick="cancelEdit()">취소</button>
        </div></div>`;
      return `<div class="msg-line ${me?"me":"other"}">${me?"":av}${row}${me?av:""}</div>`;
    }

    /* 수정/삭제·공유는 내 메시지에만. (팀 화면의 공유된 메시지는 원 프로젝트에서 수정) */
    const editable = me && ((scope && scope!=="team") || !m.source);
    const canShare = opts.share && me;
    const hasActions = editable || canShare;
    const isOpen = openMsg && openMsg.scope===scope && openMsg.id===m.id;
    const share = canShare
      ? `<button class="msg-share ${m.shared?"on":""}" title="이 메시지를 팀 전체 의견방에도 보여줘요" onclick="toggleShare('${opts.subjectId}','${m.id}')">${m.shared?"✓ 팀 전체에 공유됨":"📢 팀 전체에 공유"}</button>`
      : "";
    const actions = editable
      ? `<button class="msg-share" onclick="editMsg('${scope}','${m.id}')">수정</button><button class="msg-share danger" onclick="deleteMsg('${scope}','${m.id}')">삭제</button>`
      : "";
    const controls = (isOpen && hasActions) ? `<div class="msg-actions">${share}${actions}</div>` : "";
    const clickAttr = hasActions ? ` onclick="toggleMsg('${scope}','${m.id}')" style="cursor:pointer"` : "";
    const row=`<div class="msg-row ${me?"me":"other"}">${src}${name}<div class="msg ${me?"me":"other"}"${clickAttr}>${esc(m.text)}</div>${controls}</div>`;
    const un = scope ? unreadPeople(scope, m.ts||0) : 0;
    const unTag = un>0 ? `<span class="msg-unread" title="아직 ${un}명이 안 읽음">${un}</span>` : "";
    return `<div class="msg-line ${me?"me":"other"}">${me?unTag:""}${me?"":av}${row}${me?av:""}${me?"":unTag}</div>`;

}

async function deleteSubject(){
  const s=cur(); if(!s) return;
  /* 저장소 파일은 DB 연쇄삭제로 안 지워지므로 먼저 정리 */
  const paths=(s.files||[]).map(f=>f.path);
  if(paths.length){
    const rm = await sb.storage.from("files").remove(paths);
    if(rm.error) return dbError(rm.error);
  }

const app = document.getElementById("app");
function render(){
  /* 다시 그리기 전, 채팅 스크롤 상태를 기억 (전체 리렌더로 사라지므로) */
  const oldChat=document.querySelector(".chat");
  let stick, oldTop=0;
  if(oldChat){
    oldTop=oldChat.scrollTop;
    /* 맨 아래 60px 이내면 새 메시지를 따라 내려감, 위로 올려 읽던 중이면 위치 보존 */
    stick=(oldChat.scrollHeight - oldChat.scrollTop - oldChat.clientHeight) < 60;
  } else {
    stick=true;  /* 방금 대화방을 열었으면 최신(맨 아래)으로 */
  }

  if(view.name==="home") renderHome();
  else if(view.name==="features") renderFeatures();
  else if(view.name==="mypage") renderMyPage();
  else if(view.name==="profile") renderProfile();
  else if(view.name==="teams") renderTeams();
  else if(view.name==="subject") renderSubject();
  else renderDashboard();

  const newChat=document.querySelector(".chat");
  if(newChat) newChat.scrollTop = stick ? newChat.scrollHeight : oldTop;
}

function miniCalHtml(){
  const wd=["일","월","화","수","목","금","토"].map(w=>`<div class="pv-wd">${w}</div>`).join("");
  const evMap={5:["#1d9e75"],11:["#5b6cff"],12:["#3f4756"],18:["#e0574f"],19:["#5b6cff","#1d9e75"],25:["#e8942e"]};
  let cells="";
  for(let i=0;i<3;i++) cells+=`<div class="pv-cell" style="border-color:transparent"></div>`;
  for(let d=1;d<=28;d++){
    const evs=(evMap[d]||[]).map(c=>`<div class="pv-ev" style="background:${c}"></div>`).join("");
    cells+=`<div class="pv-cell">${d}${evs}</div>`;
  }
  return `<div class="pv-cal">${wd}${cells}</div>`;
}

async function sendReset(){
  const email=val("fpEmail").trim();
  if(!email) return dbError({message:"이메일을 입력해주세요"});
  /* 하위경로 배포(예: /teamfit/)에서도 앱 URL 그대로 돌아오게 (쿼리·해시 제거) */
  const backTo = location.href.split("#")[0].split("?")[0];
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: backTo });
  if(error) return dbError(error);
  killModal();
  toast("재설정 메일을 보냈어요 📧 메일함을 확인해주세요");
}
/* 메일 링크로 돌아왔을 때 뜨는 창 */
function newPasswordModal(){
  showModal(`
    <h3>새 비밀번호 설정</h3>
    <div class="modal-sub">메일의 링크로 들어오셨어요. 새로 쓸 비밀번호를 정해주세요.</div>
    <div class="field">
      <label>새 비밀번호 (6자 이상)</label>
      <input id="npPw" type="password" placeholder="새 비밀번호" autofocus
        onkeydown="if(event.key==='Enter')saveNewPassword()" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveNewPassword()">변경하기</button>
    </div>`);
}
async function saveNewPassword(){
  const pw=val("npPw");
  if(!pw || pw.length<6) return dbError({message:"6자 이상 입력해주세요"});
  const { error } = await sb.auth.updateUser({ password: pw });
  if(error) return dbError(error);
  killModal();
  await loadProfile(); await loadTeams();
  toast("비밀번호를 바꿨어요 ✓");
  goTeams();
}
async function doSignup(){
  const nick=val("suNick").trim(), email=val("suEmail").trim(), pw=val("suPw");
  if(!nick) return dbError({message:"닉네임을 입력해주세요"});
  if(!email || !pw) return dbError({message:"이메일과 비밀번호를 입력해주세요"});
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if(error) return dbError(error);
  if(!data.session){
    killModal();
    return dbError({message:"가입 완료! 이메일 인증이 켜져 있어요. 메일함을 확인해주세요."});
  }
  session = data.session;
  state.me = nick;
  await loadProfile();
  state.me = nick; await saveProfile();
  killModal();
  await loadTeams(); goTeams();
}
async function doLogin(){
  const email=val("liEmail").trim(), pw=val("liPw");
  if(!email || !pw) return dbError({message:"이메일과 비밀번호를 입력해주세요"});
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error) return dbError(error);
  session = data.session;
  await loadProfile();
  killModal();
  await loadTeams(); goHome();
}
async function doLogout(){
  await sb.auth.signOut();
  session = null; state.teams = [];
  goHome();
}

async function doJoin(){
  const code=val("joinCode").trim().toUpperCase(); if(!code) return;
  /* 아직 멤버가 아니면 팀을 조회할 권한이 없으므로 서버 함수로 확인+가입을 한 번에 */
  const { data, error } = await sb.rpc("join_team_by_code",
    { p_code:code, p_member_name:currentUser() });
  if(error) return dbError(error);
  if(!data) return dbError({message:"초대코드를 찾을 수 없어요. 코드를 다시 확인해주세요."});
  killModal();
  await loadTeams();
  await openTeam(data);
}

/* ===== 자료(파일) ===== */
const MAX_FILE_MB = 20;
function fileSize(n){
  if(!n && n!==0) return "";
  if(n < 1024) return n+" B";
  if(n < 1024*1024) return Math.round(n/1024)+" KB";
  return (n/1024/1024).toFixed(1)+" MB";
}
async function uploadFile(input, subjectId){
  const f = input.files && input.files[0]; if(!f) return;
  if(f.size > MAX_FILE_MB*1024*1024){
    input.value="";
    return dbError({message:`${MAX_FILE_MB}MB 이하 파일만 올릴 수 있어요 (지금 ${fileSize(f.size)})`});
  }
  const safe = f.name.replace(/[^\w.\-가-힣ㄱ-ㅎㅏ-ㅣ ]/g,"_");
  const path = `${view.teamId}/${subjectId||"team"}/${Date.now()}_${safe}`;
  toast("올리는 중…");
  const up = await sb.storage.from("files").upload(path, f, {upsert:false});
  if(up.error){ input.value=""; return dbError(up.error); }
  const ins = await sb.from("files").insert({
    team_id:view.teamId, subject_id:subjectId||null,
    name:f.name, path, size:f.size, uploaded_by:currentUser()
  });
  if(ins.error){ input.value=""; return dbError(ins.error); }
  input.value="";
  await refresh();
  toast("자료를 올렸어요 📎");
}
async function openFile(path, name){
  const { data, error } = await sb.storage.from("files").createSignedUrl(path, 60);
  if(error) return dbError(error);
  const a=document.createElement("a");
  a.href=data.signedUrl; a.download=name; a.target="_blank"; a.rel="noopener";
  document.body.appendChild(a); a.click(); a.remove();
}
async function delFile(id, path){
  const rm = await sb.storage.from("files").remove([path]);
  if(rm.error) return dbError(rm.error);
  const { error } = await sb.from("files").delete().eq("id",id);
  if(error) return dbError(error);
  await refresh(); toast("자료를 삭제했어요");
}

/* ===== 초대코드 복사 ===== */
async function copyText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text); return true;
    }
  }catch(e){}
  /* file://처럼 보안 컨텍스트가 아닐 때를 위한 대체 방법 */
  try{
    const ta=document.createElement("textarea");
    ta.value=text; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.top="0"; ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, text.length);
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
async function copyCode(){
  const code=T().code||""; if(!code) return;
  const ok=await copyText(code);
  if(ok) toast(`초대코드 ${code} 복사했어요 📋`);
  else dbError({message:"복사에 실패했어요. 코드를 직접 선택해 복사해주세요."});
}

/* ===== 반복 일정 ===== */
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function genDates(start, freq, until){
  const out=[];
  const s=new Date(start+"T00:00"), end=new Date(until+"T00:00");
  if(isNaN(s)||isNaN(end)) return out;

  if(freq==="monthly"){
    /* 매월 같은 날. 그 달에 그 날이 없으면(31일→2월) 그 달 마지막 날로 */
    const day=s.getDate();
    let y=s.getFullYear(), m=s.getMonth(), guard=0;
    while(guard<400){
      const lastDay=new Date(y, m+1, 0).getDate();
      const d=new Date(y, m, Math.min(day, lastDay));
      if(d>end) break;
      if(d>=s) out.push(fmtDate(d));
      m++; if(m>11){ m=0; y++; }
      guard++;
    }
    return out;
  }

  const d=new Date(s.getTime());
  let guard=0;
  while(d<=end && guard<400){
    out.push(fmtDate(d));
    d.setDate(d.getDate() + (freq==="biweekly"?14:7));
    guard++;
  }
  return out;
}
function repeatStart(subjectId){
  const t=new Date();
  const start=`${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
  const selStyle="width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;background:var(--card)";
  const where = subjectId ? "이 과목" : "팀 전체";

      만들어질 곳: <b>${esc(where)}</b></div>
    <div class="field">
      <label>무슨 일정인가요?</label>
      <input id="rpTitle" placeholder="예: 주차별 정리본 제출" autofocus />

      <input id="rpStart" type="date" value="${start}" onchange="rpPreview()" />
    </div>
    <div class="field">
      <label>얼마나 자주?</label>
      <select id="rpFreq" style="${selStyle}" onchange="rpPreview()">
        <option value="weekly">매주</option>
        <option value="biweekly">격주 (2주마다)</option>
        <option value="monthly">매월</option>
      </select>
    </div>
    <div class="field">
      <label>언제까지? (예: 학기 마지막 주)</label>
      <input id="rpUntil" type="date" onchange="rpPreview()" />
    </div>
    <div class="rp-preview muted" id="rpPreview">종료 날짜를 정하면 몇 개가 만들어지는지 여기서 미리 보여줄게요.</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="doRepeat(${subjectId?`'${subjectId}'`:"null"})">만들기</button>
    </div>`);
  rpPreview();
}
/* 만들어질 날짜를 실시간으로 미리보기 */
function rpPreview(){
  const el=document.getElementById("rpPreview"); if(!el) return;
  const start=val("rpStart"), freq=val("rpFreq"), until=val("rpUntil");
  if(!start || !until){
    el.className="rp-preview muted";
    el.textContent="종료 날짜를 정하면 몇 개가 만들어지는지 여기서 미리 보여줄게요.";
    return;
  }
  const ds=genDates(start,freq,until);
  if(!ds.length){
    el.className="rp-preview warn";
    el.textContent="종료 날짜가 시작 날짜보다 빨라요.";
    return;
  }
  if(ds.length>100){
    el.className="rp-preview warn";
    el.textContent=`${ds.length}개는 너무 많아요. 종료 날짜를 줄여주세요.`;
    return;
  }
  const wd=["일","월","화","수","목","금","토"];
  const label=d=>`${d.slice(5).replace("-","/")}(${wd[new Date(d+"T00:00").getDay()]})`;
  const head=ds.slice(0,3).map(label).join(", ");
  const tail=ds.length>3 ? ` … ${label(ds[ds.length-1])}` : "";
  el.className="rp-preview ok";
  el.innerHTML=`<b>총 ${ds.length}개</b> 일정이 만들어져요<br><span class="rp-dates">${head}${tail}</span>`;
}
async function doRepeat(subjectId){
  const title=val("rpTitle").trim(), start=val("rpStart"), freq=val("rpFreq"), until=val("rpUntil");
  if(!title) return dbError({message:"내용을 입력해주세요"});
  if(!start || !until) return dbError({message:"시작·종료 날짜를 정해주세요"});
  const dates=genDates(start,freq,until);
  if(!dates.length) return dbError({message:"종료 날짜가 시작 날짜보다 빨라요"});
  if(dates.length>100) return dbError({message:`${dates.length}개는 너무 많아요. 종료 날짜를 줄여주세요`});
  const sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : null;
  const rows = dates.map(d=>({team_id:view.teamId, subject_id:subjectId||null, title, date:d, series_id:sid}));
  const { error } = await sb.from("schedules").insert(rows);
  if(error) return dbError(error);
  killModal(); await refresh();
  toast(`${dates.length}개 일정을 만들었어요 🔁`);
}

/* ===== 모달 공통 ===== */
function showModal(html){
  let o=document.getElementById("overlay");
  if(!o){ o=document.createElement("div"); o.id="overlay"; o.className="overlay";
    o.addEventListener("mousedown",e=>{if(e.target===o)closeModal();}); document.body.appendChild(o); }
  o.innerHTML=`<div class="modal">${html}</div>`;
  const f=o.querySelector("input[autofocus],input"); if(f) setTimeout(()=>f.focus(),50);
}
function closeModal(){ const o=document.getElementById("overlay"); if(o) o.remove(); render(); }
/* Esc로 열린 모달 닫기 */
document.addEventListener("keydown", e=>{
  if(e.key==="Escape" && document.getElementById("overlay")) closeModal();
});

/* ===== 유틸 ===== */
function val(id){ const e=document.getElementById(id); return e?e.value:""; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* 메일의 재설정 링크로 돌아오면 새 비밀번호 창을 띄움 */

(async function boot(){

  session = data ? data.session : null;
  if(isLoggedIn()){
    await loadProfile();
    await loadTeams();
  }
  render();
})();
</script>
